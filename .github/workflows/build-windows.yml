name: Build Windows app

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to receive the Windows build
        required: true
        default: v0.2.1

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pyinstaller>=6.10,<7"

      - name: Build application
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean HandwritingPrintStudioWindows.spec

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\Handwriting Print Studio" `
            -DestinationPath "Handwriting-Print-Studio-Windows-x64-v0.2.1.zip" `
            -CompressionLevel Optimal

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Handwriting-Print-Studio-Windows-x64-v0.2.1
          path: Handwriting-Print-Studio-Windows-x64-v0.2.1.zip

      - name: Attach ZIP to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload $env:RELEASE_TAG `
            "Handwriting-Print-Studio-Windows-x64-v0.2.1.zip" `
            --clobber

